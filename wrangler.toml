name = "obin-portfolio"
compatibility_date = "2024-11-01"
main = "worker/index.ts"

# Serve the built Vite SPA as static assets; the Worker (main) only intercepts
# /api/feeds and otherwise falls through to these files.
[assets]
directory = "./dist"
binding = "ASSETS"
# The site is a single page (hash-anchor nav), so unknown paths should be real
# 404s (served from 404.html), not soft-404 index.html with a 200.
not_found_handling = "404-page"

# Deploy:  npm run build && npx wrangler deploy
# (Cloudflare's connected Git build runs `npm run build` then `npx wrangler deploy`.)
#
# Optional: set the Goodreads RSS URL so the books section goes live:
#   npx wrangler secret put GOODREADS_RSS
