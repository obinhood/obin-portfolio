<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="robots" content="noindex" />
    <title>404 — Obin Nguyen</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a0a0b;
        color: #f5f5f7;
        font-family: "Geist Mono", ui-monospace, monospace;
        text-align: center;
        padding: 24px;
        background-image:
          radial-gradient(60% 80% at 80% 10%, rgba(43, 91, 255, 0.18), transparent 55%),
          radial-gradient(55% 70% at 15% 100%, rgba(255, 61, 129, 0.14), transparent 60%);
      }
      .code {
        font-family: "Clash Display", system-ui, sans-serif;
        font-weight: 700;
        font-size: clamp(5rem, 22vw, 12rem);
        line-height: 0.9;
        letter-spacing: -0.04em;
        background: linear-gradient(100deg, #2b5bff, #ff3d81 45%, #f5a623);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p { margin-top: 12px; color: #9c9eaa; font-size: 0.9rem; letter-spacing: 0.1em; }
      a {
        display: inline-block;
        margin-top: 28px;
        padding: 12px 22px;
        border-radius: 9999px;
        background: #f5a623;
        color: #0a0a0b;
        font-weight: 600;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <p>[ this page wandered off the map ]</p>
      <a href="/">← Back to obinle.com</a>
    </main>
  </body>
</html>
